<ul class="flex items-center gap-4">
  <!-- 최근 수집 시각 -->
  <li class="flex items-center gap-2 px-3 py-1 bg-white rounded-lg shadow-sm">
    <i class="bi bi-clock text-blue-500 text-lg"></i>
    <span class="text-sm text-gray-600 font-medium">최근 수집시각:</span>
    <span id="last-crawling-time" class="text-sm text-gray-700 font-bold"
      >-</span
    >
  </li>

  <!-- 홈페이지 문의 갯수 (Jinja2 조건문) -->
  {% if data.contact_unread_count is defined and data.contact_unread_count > 0
  %}
  <li
    id="contact-unread-li"
    class="flex items-center gap-2 px-3 py-1 bg-white rounded-lg shadow-sm bg-red-100"
  >
    <i class="bi bi-envelope-fill text-red-500 text-lg"></i>
    <span class="text-sm font-medium" id="contact-unread-label"
      >홈페이지 문의 갯수:
      <span id="contact-unread-count"
        >{{ data.contact_unread_count }}</span
      ></span
    >
  </li>
  {% endif %}

  <!-- 크롤러 상태 -->
  <li class="flex items-center gap-2 px-3 py-1 bg-white rounded-lg shadow-sm">
    <i
      id="crawler-status-icon"
      class="bi bi-check-circle-fill text-green-500 text-lg"
    ></i>
    <span id="crawler-status-text" class="text-sm text-gray-700 font-medium"
      >크롤러 정상</span
    >
  </li>
</ul>

<script>
  // UI 업데이트 (공통 로직)

  function updateUI(data) {
    // 최근 수집 시각 업데이트
    const timeElement = document.getElementById("last-crawling-time");
    if (timeElement) {
      timeElement.textContent = data.last_crawling_time || "-";
    }

    // 크롤러 상태 업데이트
    const statusIcon = document.getElementById("crawler-status-icon");
    const statusText = document.getElementById("crawler-status-text");

    if (data.healthy === "ok") {
      // 정상 상태
      if (statusIcon) {
        statusIcon.classList.remove(
          "bi-exclamation-circle-fill",
          "text-yellow-500",
        );
        statusIcon.classList.add("bi-check-circle-fill", "text-green-500");
      }
      if (statusText) {
        statusText.textContent = "크롤러 정상";
        statusText.classList.remove("text-yellow-600");
        statusText.classList.add("text-green-600");
      }
    } else {
      // 체크 필요 상태
      if (statusIcon) {
        statusIcon.classList.remove("bi-check-circle-fill", "text-green-500");
        statusIcon.classList.add(
          "bi-exclamation-circle-fill",
          "text-yellow-500",
        );
      }
      if (statusText) {
        statusText.textContent = "크롤링 체크요망";
        statusText.classList.remove("text-green-600");
        statusText.classList.add("text-yellow-600");
      }
    }

    // 홈페이지 문의 갯수 표시
    const contactUnreadLi = document.getElementById("contact-unread-li");
    const contactUnreadCount = document.getElementById("contact-unread-count");
    if (
      typeof data.contact_unread_count === "number" &&
      contactUnreadLi &&
      contactUnreadCount
    ) {
      if (data.contact_unread_count > 0) {
        contactUnreadCount.textContent = data.contact_unread_count;
        contactUnreadLi.style.display = "flex";
        contactUnreadLi.classList.add("bg-red-100");
        contactUnreadCount.classList.add("text-red-600", "font-bold");
      } else {
        contactUnreadLi.style.display = "none";
        contactUnreadCount.textContent = "0";
        contactUnreadLi.classList.remove("bg-red-100");
        contactUnreadCount.classList.remove("text-red-600", "font-bold");
      }
    }
  }

  // 크롤러 헬스 체크 API 호출
  async function updateCrawlerHealth() {
    try {
      const response = await fetch("/api/v1/dashboard/crawler-health");
      if (!response.ok) {
        throw new Error("API 호출 실패");
      }

      const data = await response.json();

      // 캐시에 저장
      sessionStorage.setItem("crawlerHealthData", JSON.stringify(data));
      sessionStorage.setItem("crawlerHealthTime", Date.now().toString());

      updateUI(data);
    } catch (error) {
      console.error("크롤러 헬스 체크 실패:", error);
    }
  }

  // 페이지 로드 시: 캐시된 데이터 먼저 표시
  function initCrawlerHealth() {
    const cachedData = sessionStorage.getItem("crawlerHealthData");
    if (cachedData) {
      try {
        updateUI(JSON.parse(cachedData));
      } catch (e) {
        console.error("캐시 로드 실패:", e);
      }
    }
    // 백그라운드 업데이트 즉시 시작
    updateCrawlerHealth();
  }

  // 페이지 로드 시 캐시 먼저 표시
  initCrawlerHealth();

  // 5분마다 백그라운드 업데이트
  setInterval(updateCrawlerHealth, 300000);
</script>
